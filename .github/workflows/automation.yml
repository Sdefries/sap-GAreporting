name: SAP Ad Grants Automation

on:
  schedule:
    - cron: '0 13 * * *'   # Alert watcher 8am ET daily
    - cron: '0 21 * * *'   # Alert watcher 4pm ET daily
    - cron: '0 13 * * 1'   # Monday digest 8am ET
    - cron: '0 14 1 * *'   # Monthly reports 9am ET on 1st

  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'alerts'
        type: choice
        options:
          - alerts
          - digest
          - reports
          - all

jobs:

  # ── ALERT WATCHER ─────────────────────────────────────────────────────
  alerts:
    name: Alert watcher
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-ads

      - name: Write Google Ads credentials
        env:
          GOOGLE_ADS_YAML: ${{ secrets.GOOGLE_ADS_YAML }}
        run: echo "$GOOGLE_ADS_YAML" > google-ads.yaml

      - name: Restore alert state cache
        uses: actions/cache@v4
        with:
          path: .alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Fetch Google Ads data
        run: python fetch_google_ads.py

      - name: Run alert watcher
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
        run: python alert_watcher.py

      - name: Save alert state cache
        uses: actions/cache@v4
        with:
          path: .alert_state.json
          key: alert-state-${{ github.run_id }}

  # ── MONDAY DIGEST ─────────────────────────────────────────────────────
  digest:
    name: Monday digest
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * 1') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'digest' || github.event.inputs.job == 'all'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-ads

      - name: Write Google Ads credentials
        env:
          GOOGLE_ADS_YAML: ${{ secrets.GOOGLE_ADS_YAML }}
        run: echo "$GOOGLE_ADS_YAML" > google-ads.yaml

      - name: Fetch Google Ads data
        run: python fetch_google_ads.py

      - name: Run Slack digest
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python slack_digest.py

  # ── MONTHLY REPORTS ───────────────────────────────────────────────────
  reports:
    name: Monthly client reports
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 14 1 * *') ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.job == 'reports' || github.event.inputs.job == 'all'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-ads reportlab matplotlib

      - name: Write Google Ads credentials
        env:
          GOOGLE_ADS_YAML: ${{ secrets.GOOGLE_ADS_YAML }}
        run: echo "$GOOGLE_ADS_YAML" > google-ads.yaml

      - name: Fetch Google Ads data
        run: python fetch_google_ads.py

      - name: Check for generate_reports.py
        run: |
          if [ ! -f generate_reports.py ]; then
            echo "generate_reports.py not found — skipping report generation"
            echo "SKIP_REPORTS=true" >> $GITHUB_ENV
          fi

      - name: Generate client reports
        if: env.SKIP_REPORTS != 'true'
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}
        run: python generate_reports.py

      - name: Commit reports
        if: env.SKIP_REPORTS != 'true'
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "SAP Automation"
          git add reports/ || true
          git diff --staged --quiet || git commit -m "Monthly reports $(date +'%B %Y')"
          git push || true
